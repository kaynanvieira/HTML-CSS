<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e Quebra de linhas</h1>
    <hr>
    <p>Você pode escrever um Parágrafo 
        de qualquer jeito. Basta colocar tudo <!--Comentário-->
        no meio do par de tags &lt;p&gt; e &lt;/p&gt;.<!--Lees than e greater than-->
    </p>
    <p>Se precisar quebrar o parágrafo <br> basta usar a tag &lt;br&gt;.</p>
    <p>Símbolos especiais:
        &reg;
        &copy;
        &trade;
        &euro;
        &uparrow;
        &uarr;
        &pound;
        &cent;
        &delta;
    </p>
    <p>Emojis
        &#x1F609;
        😉<!-- copiei do emojipedia-->
        &#x1f620;
        😠
    </p>
</body>
</html>
