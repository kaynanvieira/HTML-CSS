<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários disositivos diferentes ou 
        simplesmente aumente o tamanho do seu navegador.
    </p>
    <picture>
        <source media="(max-width: 750px )" srcset="imagens/foto-p.png"
         type="image/png">
        <source media="(max-width:1050px )" srcset="imagens/foto-m.png" 
        type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexível">
    </picture>
    
    <h1>Reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <!-- <audio src="midia/Coldplay - The Scientist.mp3" controls autoplay ></audio>
    -->
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/Coldplay - The Scientist.mp3" type="audio/mpeg">
    </audio>
    
</body>
</html>
